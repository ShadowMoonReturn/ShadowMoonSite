<!doctype html>
<html>

	<head>
		<meta charset="utf-8">
		<title></title>
		<link href="css/allcss.css" rel="stylesheet"/>
		<link rel="icon" href="./images/icon-bf.png" type="image/png">
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,user-scalable=no" />
	</head>
	<style type="text/css">
		.imgall{
				position: fixed;          
			    top: 0;
			    left: 0;
			    width: 100%;
			    height: 108vh;
			    background: url(images/sky.png) no-repeat center/cover;
			    /* filter: blur(100px); */
			    z-index: -9999;
				transition: background-image 0.4s ease-in;
				animation: blurin 1.5s ease-out forwards;
		}
		#livesystem,#groupsystem,#fanssystem,#administrator{
			width: 100%;
			height: 400px;
			background: rgba(0,0,0,0.2);
		}
		#groupsystem{
			width: 100%;
			height: 400px;
			background: rgba(0,0,0,0.2);
		}
		h1{
			margin: 20px 0;
		}
		p{
			color: white;
		}
	</style>
	<body>
		<div class="imgall"></div>
		
		<h1 style="text-align: center;color: white;">直播体系(数据可视化)</h1>
		<div id="livesystem">
			
		</div>
		<h1 style="text-align: center;color: white;">团群体系(数据可视化)</h1>
		<div id="groupsystem">
			
		</div>
		<h1 style="text-align: center;color: white;">观众体系(数据可视化)</h1>
		<div id="fanssystem">
			
		</div>
		<h1 style="text-align: center;color: white;">管理体系(数据可视化)</h1>
		<div id="administrator">
			
		</div>
	</body>
	<script src="js/echarts.js"></script>
	
	<script type="text/javascript">
		console.log(echarts.version);
		var livechart = echarts.init(document.getElementById("livesystem"))
		var liveoption = {
			legend:{
				data:[{name:'影月'}],
				top:'bottom',
				textStyle: {
				        color: 'white',
				    },
				
			},
			series:[{
				type:'pie',
				center:['50%','50%'],
				radius:'55%',
				data:[{name:'影月',value:100}],
				label:{
				formatter:'{d}%'
				}
				
			}],
			tooltip: {
			  trigger: 'item',
			  formatter: '{b}: {c}%'
			},	
		}
		livechart.setOption(liveoption);
		var groupchart = echarts.init(document.getElementById("groupsystem"))
		var groupoption = {
			legend: {
				data: [{name: '影月'}, {name: '管理'}, {name: '观众'}],
				top: 'bottom',
				textStyle: {
					color: 'white',
				},
			},
			series: [{
				type: 'pie',
				center: ['50%', '50%'],
				radius: '55%',
				data: [
					{name: '影月', value: 1},
					{name: '管理', value: 1},
					{name: '观众', value: 98}
				],
				label: {
				formatter: '{d}%'
				}
			}],
			tooltip: {
				trigger: 'item',
				formatter: '{b}: {c}%'
			},
		}
		groupchart.setOption(groupoption);
		var fanschart = echarts.init(document.getElementById("fanssystem"))
		var fansoption = {
			legend: {
				data: [{name: '全体观众'}],
				top: 'bottom',
				textStyle: {
					color: 'white',
				},
			},
			series: [{
				type: 'pie',
				center: ['50%', '50%'],
				radius: '55%',
				data: [
					{
						name: '全体观众',
						value: 100,
						itemStyle:{color:'#91cc75'}
						},
				],
				label: {
				    formatter: '{b}\n{d}%',
				    lineHeight: 22,           // 加大行间距
				    position: 'outside',      // 标签放到扇区外面
				},
			}],
			tooltip: {
				trigger: 'item',
				formatter: '{b}: {c}%'
			},
		}
		fanschart.setOption(fansoption);
		
		var adminchart = echarts.init(document.getElementById("administrator"))
		var adminoption = {
			legend: {
				data: [{name: '影月'}, {name: '管理'}, {name: '观众'}],
				top: 'bottom',
				textStyle: {
					color: 'white',
				},
			},
			series: [{
				type: 'pie',
				center: ['50%', '50%'],
				radius: '55%',
				data: [
					{name: '影月', value: 85},
					{name: '管理', value: 10},
					{name: '观众', value: 5}
				],
				label: {
				    formatter: '{b}\n{d}%',
				    lineHeight: 22,
				    position: 'outside',
				},
			}],
			tooltip: {
				trigger: 'item',
				formatter: '{b}: {c}%'
			},
		}
		adminchart.setOption(adminoption);
	</script>
</html>
