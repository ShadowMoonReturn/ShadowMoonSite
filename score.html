<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link href="css/allcss.css" rel="stylesheet"/>
	
    <title>风格理解考试 - 加密成绩查询系统</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
		
        body{
            padding-top:80px;
        }
		.imgall{
				position: fixed;          
			    top: 0;
			    left: 0;
			    width: 100%;
			    height: 108vh;
			    background: url(images/PissvilleBack.png) no-repeat center/cover;
			    
			    z-index: -9999;
				transition: background-image 0.4s ease-in;
				animation: blurin 1.5s ease-out forwards;
		}
        .box{
            width: 400px;
            margin: 0 auto;
            background:#fff;
            padding:30px;
            border-radius:12px;
            box-shadow:0 0 5px rgba(0,0,0,0.5);
        }
        h2{
            text-align:center;
            margin-bottom:25px;
            color:#333;
        }
        input{
            width:100%;
            height:45px;
            padding:0 15px;
            margin-bottom:20px;
            border:1px solid #ccc;
            border-radius:6px;
            font-size:16px;
        }
        button{
            width:100%;
            height:45px;
            background:#2d8cf0;
            color:#fff;
            border:none;
            border-radius:6px;
            font-size:17px;
            cursor:pointer;
        }
        .res{
            margin-top:20px;
            padding:15px;
            border-radius:6px;
            background:#f0f7ff;
            line-height:1.8;
        }
    </style>
</head>
<body>
	<div class="imgall">
	</div>
    <div class="box">
        <h2>10w级风格理解观众定权考试查分系统</h2>
        <input type="text" id="code" placeholder="请输入你的准考证号">
        <button onclick="checkScore()">立即查询成绩</button>
        <div class="res" id="result"></div>
    </div>

    <script src="js/score.js"></script>
</body>
</html>
